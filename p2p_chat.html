<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Anon P2P Threads</title>
	<style>
	:root {
		--bg: #000;
		--surface: #0f0f10;
		--surface-2: #151516;
		--line: #262629;
		--text: #f5f5f5;
		--muted: #a1a1aa;
		--soft: #71717a;
		--accent: #fff;
		--dm: #10182c;
		--dm-line: #2d4b85;
		--danger: #ff6b6b;
		--radius-xl: 28px;
		--radius-lg: 22px;
		--radius-md: 16px;
		--radius-sm: 12px;
		--mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
	}

	* { box-sizing: border-box; }

	html { color-scheme: dark; }

	body {
		margin: 0;
		padding: 0;
		font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		background:
			radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 28%),
			linear-gradient(180deg, #050505 0%, #000 100%);
		color: var(--text);
	}

	header {
		position: sticky;
		top: 0;
		z-index: 10;
		padding: 14px 18px;
		background: rgba(0,0,0,0.78);
		backdrop-filter: blur(16px);
		border-bottom: 1px solid rgba(255,255,255,0.07);
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 14px;
		flex-wrap: wrap;
	}

	h1 {
		margin: 0;
		font-size: 1.05rem;
		font-weight: 700;
		letter-spacing: -0.03em;
		color: #fff;
	}

	main {
		max-width: 1180px;
		margin: 0 auto;
		padding: 20px 16px 36px;
		display: grid;
		grid-template-columns: 300px minmax(0, 1fr);
		gap: 20px;
		align-items: start;
	}

	@media (max-width: 900px) {
		main { grid-template-columns: 1fr; }
	}

	.left-rail {
		display: grid;
		gap: 14px;
		position: sticky;
		top: 84px;
	}

	@media (max-width: 900px) {
		.left-rail { position: static; }
	}

	.center {
		min-width: 0;
	}

	.panel {
		background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
		border: 1px solid rgba(255,255,255,0.08);
		border-radius: var(--radius-xl);
		padding: 18px;
		box-shadow: 0 8px 30px rgba(0,0,0,0.28);
	}

	.panel h2 {
		margin: 0 0 12px;
		font-size: 0.96rem;
		font-weight: 700;
		letter-spacing: -0.02em;
		color: #fff;
	}

	label {
		display: block;
		margin-bottom: 6px;
		font-size: 0.8rem;
		color: var(--muted);
	}

	input, textarea {
		width: 100%;
		padding: 13px 14px;
		border-radius: 16px;
		border: 1px solid rgba(255,255,255,0.08);
		background: rgba(255,255,255,0.04);
		color: var(--text);
		font-family: inherit;
		outline: none;
		transition: border-color 0.15s ease, background 0.15s ease;
	}

	input::placeholder, textarea::placeholder {
		color: #70707a;
	}

	input:focus, textarea:focus {
		border-color: rgba(255,255,255,0.18);
		background: rgba(255,255,255,0.06);
	}

	textarea {
		resize: vertical;
		min-height: 112px;
	}

	button {
		width: 100%;
		padding: 12px 16px;
		border-radius: 999px;
		border: 0;
		cursor: pointer;
		font-family: inherit;
		font-weight: 700;
		transition: transform 0.15s ease, opacity 0.15s ease;
	}

	button:hover { transform: translateY(-1px); }
	button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

	.primary-btn {
		background: #fff;
		color: #000;
	}

	.secondary-btn {
		background: rgba(255,255,255,0.06);
		color: #fff;
		border: 1px solid rgba(255,255,255,0.08);
	}

	.row {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		gap: 10px;
	}

	@media (max-width: 560px) {
		.row { grid-template-columns: 1fr; }
	}

	.mt { margin-top: 10px; }
	.mb { margin-bottom: 10px; }

	.status {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
	}

	.pill {
		padding: 9px 12px;
		border-radius: 999px;
		border: 1px solid rgba(255,255,255,0.08);
		background: rgba(255,255,255,0.04);
		color: var(--muted);
		font-size: 0.8rem;
	}

	.pill strong {
		color: #fff;
		font-weight: 600;
	}

	.badge {
		background: rgba(255,255,255,0.04);
		border: 1px solid rgba(255,255,255,0.07);
		padding: 10px 12px;
		border-radius: 16px;
		font-size: 0.8rem;
		color: var(--muted);
		line-height: 1.5;
	}

	.muted { color: var(--muted); }
	.mono { font-family: var(--mono); font-size: 12px; }
	.danger { color: var(--danger); }

	.composer {
		background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
		border: 1px solid rgba(255,255,255,0.08);
		border-radius: 32px;
		padding: 18px;
		margin-bottom: 16px;
		box-shadow: 0 8px 30px rgba(0,0,0,0.28);
	}

	.composer-top {
		display: grid;
		grid-template-columns: 44px minmax(0, 1fr);
		gap: 12px;
		align-items: start;
	}

	.avatar {
		width: 40px;
		height: 40px;
		border-radius: 50%;
		display: grid;
		place-items: center;
		font-size: 0.82rem;
		font-weight: 700;
		background: linear-gradient(180deg, #2a2a2d, #161618);
		border: 1px solid rgba(255,255,255,0.08);
	}

	.composer-box textarea {
		border: 0;
		background: transparent;
		padding: 0;
		min-height: 96px;
		font-size: 1rem;
		line-height: 1.45;
	}

	.composer-box textarea:focus {
		border: 0;
		background: transparent;
	}

	.composer-footer {
		margin-top: 12px;
		padding-top: 12px;
		border-top: 1px solid rgba(255,255,255,0.07);
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 12px;
		flex-wrap: wrap;
	}

	.feed-panel {
		padding: 0;
		overflow: hidden;
	}

	.feed-header {
		padding: 16px 18px;
		border-bottom: 1px solid rgba(255,255,255,0.07);
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 12px;
		flex-wrap: wrap;
	}

	.feed-tabs {
		display: inline-flex;
		gap: 4px;
		padding: 4px;
		border-radius: 999px;
		background: rgba(255,255,255,0.04);
		border: 1px solid rgba(255,255,255,0.07);
	}

	.feed-tab {
		width: auto;
		padding: 9px 14px;
		background: transparent;
		color: var(--muted);
		border-radius: 999px;
		font-size: 12px;
		font-weight: 700;
	}

	.feed-tab.active {
		background: #fff;
		color: #000;
	}

	.scroller {
		max-height: 72vh;
		overflow: auto;
	}

	.feed {
		display: flex;
		flex-direction: column;
	}

	.post {
		position: relative;
		display: grid;
		grid-template-columns: 44px minmax(0, 1fr);
		gap: 12px;
		padding: 18px;
		border-bottom: 1px solid rgba(255,255,255,0.07);
		background: transparent;
	}

	.post:last-child { border-bottom: 0; }

	.post::before {
		content: "";
		position: absolute;
		left: 38px;
		top: 58px;
		bottom: -6px;
		width: 1px;
		background: rgba(255,255,255,0.08);
	}

	.post:last-child::before {
		display: none;
	}

	.post-avatar {
		width: 40px;
		height: 40px;
		border-radius: 50%;
		display: grid;
		place-items: center;
		background: linear-gradient(180deg, #2b2b2e, #161618);
		border: 1px solid rgba(255,255,255,0.08);
		font-size: 0.78rem;
		font-weight: 700;
		z-index: 1;
	}

	.post-main {
		min-width: 0;
	}

	.post .meta {
		display: flex;
		justify-content: space-between;
		align-items: center;
		gap: 10px;
		margin-bottom: 6px;
	}

	.post-author-wrap {
		display: flex;
		align-items: center;
		gap: 8px;
		min-width: 0;
	}

	.post .author {
		color: #fff;
		font-size: 0.92rem;
		font-weight: 700;
		letter-spacing: -0.02em;
	}

	.author-tag {
		color: var(--muted);
		font-family: var(--mono);
		font-size: 0.72rem;
		border: 1px solid rgba(255,255,255,0.08);
		padding: 3px 7px;
		border-radius: 999px;
	}

	.post .time {
		font-size: 0.8rem;
		color: var(--muted);
		white-space: nowrap;
	}

	.post .body {
		white-space: pre-wrap;
		word-break: break-word;
		font-size: 0.95rem;
		line-height: 1.5;
		color: #f1f1f1;
	}

	.post-actions {
		margin-top: 12px;
		display: flex;
		gap: 16px;
		color: var(--muted);
		font-size: 0.82rem;
	}

	.post.dm {
		background: var(--dm);
		border-left: 1px solid var(--dm-line);
	}

	.post.system {
		grid-template-columns: 30px minmax(0, 1fr);
		background: rgba(255,255,255,0.02);
	}

	.post.system::before { display: none; }

	.post.system .post-avatar {
		width: 28px;
		height: 28px;
		font-size: 0.68rem;
		background: rgba(255,255,255,0.05);
	}

	.post.system .author { color: var(--muted); }
	.post.system .body { color: #c9c9cf; font-size: 0.88rem; }

	@media (max-width: 560px) {
		.post {
			grid-template-columns: 38px minmax(0, 1fr);
			padding: 14px;
		}

		.post::before { left: 32px; }
	}

	button,
	.post,
	.post-actions span,
	.post-avatar,
	.feed-tab,
	input,
	textarea {
		transition:
			background 0.18s ease,
			border-color 0.18s ease,
			color 0.18s ease,
			transform 0.18s ease,
			opacity 0.18s ease,
			box-shadow 0.18s ease;
	}

	.post {
		cursor: default;
	}

	.post:hover {
		background: rgba(255,255,255,0.025);
	}

	.post:hover .post-avatar {
		transform: scale(1.03);
	}

	.post-main:hover .body {
		color: #ffffff;
	}

	.post-actions {
		margin-top: 14px;
		display: flex;
		align-items: center;
		gap: 10px;
		color: var(--muted);
		font-size: 0.82rem;
	}

	.post-actions span {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 32px;
		height: 32px;
		border-radius: 999px;
		background: transparent;
		border: 1px solid transparent;
		user-select: none;
	}

	.post-actions span:hover {
		background: rgba(255,255,255,0.06);
		border-color: rgba(255,255,255,0.08);
		color: #fff;
		transform: translateY(-1px);
	}

	.post.dm {
		background:
			linear-gradient(180deg, rgba(61, 98, 180, 0.16), rgba(61, 98, 180, 0.08));
		border-left: 1px solid rgba(90, 140, 255, 0.5);
	}

	.post.dm:hover {
		background:
			linear-gradient(180deg, rgba(61, 98, 180, 0.22), rgba(61, 98, 180, 0.1));
	}

	.post.dm .author {
		color: #dbe7ff;
	}

	.post.system {
		opacity: 0.92;
	}

	.post.system:hover {
		background: rgba(255,255,255,0.035);
	}

	.author-tag {
		max-width: 220px;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}

	.feed-header {
		position: sticky;
		top: 0;
		z-index: 3;
		background: rgba(10,10,10,0.88);
		backdrop-filter: blur(14px);
	}

	.scroller::-webkit-scrollbar {
		width: 10px;
	}

	.scroller::-webkit-scrollbar-track {
		background: transparent;
	}

	.scroller::-webkit-scrollbar-thumb {
		background: rgba(255,255,255,0.12);
		border-radius: 999px;
		border: 2px solid transparent;
		background-clip: padding-box;
	}

	.primary-btn:hover {
		box-shadow: 0 6px 20px rgba(255,255,255,0.12);
	}

	.secondary-btn:hover {
		background: rgba(255,255,255,0.09);
	}

	input:hover,
	textarea:hover {
		border-color: rgba(255,255,255,0.12);
	}

	@media (max-width: 900px) {
		main {
			padding-bottom: 110px;
		}

		.composer {
			position: fixed;
			left: 10px;
			right: 10px;
			bottom: 10px;
			z-index: 20;
			margin-bottom: 0;
			border-radius: 24px;
			background: rgba(10,10,10,0.94);
			backdrop-filter: blur(18px);
			box-shadow: 0 12px 40px rgba(0,0,0,0.45);
		}

		.composer-top {
			grid-template-columns: 36px minmax(0, 1fr);
			gap: 10px;
		}

		.composer-box textarea {
			min-height: 44px;
			max-height: 120px;
			font-size: 0.96rem;
		}

		.composer-footer {
			padding-top: 10px;
			margin-top: 10px;
		}

		.composer-footer .muted {
			display: none;
		}

		.post {
			padding-bottom: 16px;
		}
	}

</style>
	<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
	<header>
		<h1>/p2p/ Web</h1>
		<div class="status">
			<span class="pill" id="status-role">role: unknown</span>
			<span class="pill" id="status-topic">topic: none</span>
			<span class="pill" id="status-peer">id: …</span>
			<span class="pill" id="status-host">host: …</span>
		</div>
	</header>

<main>
	<div class="left-rail">
		<section class="panel">
			<h2>Join / Topic</h2>
			<div>
				<label for="secret">Shared secret</label>
				<input id="secret" placeholder="optional password" />
			</div>
			<div class="mt">
				<button id="join" class="primary-btn">Join / Refresh</button>
			</div>
			<p class="badge mt">
				Choose board from the URL query, like <span class="mono">?b</span>.
				Optionally pin your peer id with <span class="mono">id=1a2b</span>.
			</p>
		</section>

		<section class="panel">
			<h2>Direct Messages</h2>
			<div class="row">
				<div>
					<label>Your peer id</label>
					<input id="my-id" readonly />
				</div>
				<div>
					<label for="dm-target">Connect to peer id</label>
					<input id="dm-target" placeholder="e.g. ab12 or chan-b-ab12" />
				</div>
			</div>
			<div class="mt">
				<label for="dm-message">Direct message</label>
				<input id="dm-message" placeholder="type a private message and press Enter" />
			</div>
		</section>
	</div>

	<div class="center">
		<section class="composer">
			<div class="composer-top">
				<div class="avatar" id="composer-avatar">me</div>
				<div class="composer-box">
					<textarea id="message" placeholder="What’s happening in this board?"></textarea>
					<div class="composer-footer">
						<div class="muted" style="font-size: 12px;">encrypted • p2p • anonymous</div>
						<div style="display:flex; gap:10px; flex-wrap:wrap;">
							<button id="clear" class="secondary-btn" type="button">Clear feed</button>
							<button id="send" class="primary-btn" type="button">Post</button>
						</div>
					</div>
				</div>
			</div>
		</section>

		<section class="panel feed-panel">
			<div class="feed-header">
				<h2 style="margin:0;">Thread Feed</h2>
				<div class="feed-tabs" role="tablist" aria-label="Thread filters">
					<button id="tab-user" class="feed-tab active" type="button" role="tab" aria-selected="true">User</button>
					<button id="tab-system" class="feed-tab" type="button" role="tab" aria-selected="false">System</button>
				</div>
			</div>
			<div class="scroller">
				<div class="feed" id="feed"></div>
			</div>
		</section>
	</div>
</main>	

	<script>
		// extremely volatile P2P thread forum built on PeerJS (WebRTC)
		// Encryption is symmetric AES-GCM with a key derived from topic + optional shared secret

		const config = { host: "0.peerjs.com", port: 443, path: "/", secure: true, debug: 0 };
		const CLIENT_SUFFIX_KEY = "p2p_beta_client_suffix_v1";
		const USER_ID_KEY = "p2p_beta_user_id_v1";
		const THREAD_LOG_KEY_PREFIX = "p2p_beta_thread_log_v1";
		const HOST_PROBE_FAILURES_BEFORE_CLAIM = 3;
		const MAX_DIFF_NOTES_PER_SIDE = 10;
		const state = {
			topic: "b",
			secret: "",
			hostId: "",
			peerId: "",
			isHost: false,
			peer: null,
			key: null,
			clientSuffix: "",
			urlPeerSuffix: "",
			hostConn: null,
			conns: new Map(),
			history: [],
			feedEntries: [],
			feedTab: "user",
			syncInterval: null,
			hostProbeInterval: null,
			hostProbeFailures: 0,
			discoveringHost: false,
			threadLogKey: "",
			localLogSavedAt: 0,
			logReports: new Map(),
			logConsensusToken: "",
		};

		const els = {
			secret: document.getElementById("secret"),
			join: document.getElementById("join"),
			send: document.getElementById("send"),
			clear: document.getElementById("clear"),
			message: document.getElementById("message"),
			feed: document.getElementById("feed"),
			role: document.getElementById("status-role"),
			statusTopic: document.getElementById("status-topic"),
			statusPeer: document.getElementById("status-peer"),
			statusHost: document.getElementById("status-host"),
			myId: document.getElementById("my-id"),
			dmTarget: document.getElementById("dm-target"),
			dmMessage: document.getElementById("dm-message"),
			tabUser: document.getElementById("tab-user"),
			tabSystem: document.getElementById("tab-system"),
		};

		const HEX4_RE = /^[0-9a-f]{4}$/i;

		function slugify(str) {
			const base = (str || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
			return base || "b";
		}

		function randomHex4() {
			const bytes = crypto.getRandomValues(new Uint8Array(2));
			return Array.from(bytes, (b) => b.toString(16).padStart(2, "0")).join("");
		}

		function readStoredClientSuffix() {
			try {
				const saved = localStorage.getItem(CLIENT_SUFFIX_KEY) || "";
				if (HEX4_RE.test(saved) && saved !== "0000") return saved.toLowerCase();
			} catch (_) {}
			return "";
		}

		function writeStoredClientSuffix(suffix) {
			if (!HEX4_RE.test(suffix) || suffix === "0000") return;
			try {
				localStorage.setItem(CLIENT_SUFFIX_KEY, suffix.toLowerCase());
			} catch (_) {}
		}

		function ensureClientSuffix() {
			if (HEX4_RE.test(state.urlPeerSuffix) && state.urlPeerSuffix !== "0000") {
				state.clientSuffix = state.urlPeerSuffix.toLowerCase();
				return state.clientSuffix;
			}
			if (HEX4_RE.test(state.clientSuffix) && state.clientSuffix !== "0000") return state.clientSuffix;
			const saved = readStoredClientSuffix();
			if (saved) {
				state.clientSuffix = saved;
				return state.clientSuffix;
			}
			let suffix = randomHex4();
			while (suffix === "0000") suffix = randomHex4();
			state.clientSuffix = suffix;
			writeStoredClientSuffix(suffix);
			return state.clientSuffix;
		}

		function rotateClientSuffix() {
			if (HEX4_RE.test(state.urlPeerSuffix) && state.urlPeerSuffix !== "0000") {
				state.clientSuffix = state.urlPeerSuffix.toLowerCase();
				return;
			}
			let suffix = randomHex4();
			while (suffix === "0000" || suffix === state.clientSuffix) suffix = randomHex4();
			state.clientSuffix = suffix;
			writeStoredClientSuffix(suffix);
		}

		function persistUserId(peerId) {
			const id = String(peerId || "").trim().toLowerCase();
			if (!id) return;
			try {
				localStorage.setItem(USER_ID_KEY, id);
			} catch (_) {}
			const suffix = peerSuffix(id);
			if (HEX4_RE.test(suffix) && suffix !== "0000") {
				state.clientSuffix = suffix;
				writeStoredClientSuffix(suffix);
			}
		}

		function restoreUserIdFromStorage() {
			let restored = "";
			try {
				restored = String(localStorage.getItem(USER_ID_KEY) || "").trim().toLowerCase();
			} catch (_) {}
			const fallbackSuffix = readStoredClientSuffix();
			if (!restored && fallbackSuffix) restored = fullPeerIdFromSuffix(fallbackSuffix);
			if (!restored) return;
			const shown = peerSuffix(restored) || restored;
			if (HEX4_RE.test(shown) && shown !== "0000") state.clientSuffix = shown;
			els.myId.value = shown;
			els.statusPeer.textContent = `id: ${shown}`;
		}

		async function threadLogKeyFor(topic, secret) {
			const passphrase = `${topic}:${secret || ""}`;
			const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(passphrase));
			const digest = Array.from(new Uint8Array(hash), (b) => b.toString(16).padStart(2, "0")).join("");
			return `${THREAD_LOG_KEY_PREFIX}:${digest.slice(0, 24)}`;
		}

		function sanitizeHistoryEntry(raw) {
			if (!raw || typeof raw !== "object") return null;
			const from = String(raw.from || "").trim();
			const text = String(raw.text || "");
			const ts = Number(raw.ts);
			if (!from || !text || !Number.isFinite(ts)) return null;
			return { from, text, ts, dm: false, system: false };
		}

		function normalizeHistoryList(list) {
			const out = [];
			for (const raw of Array.isArray(list) ? list : []) {
				const p = sanitizeHistoryEntry(raw);
				if (!p) continue;
				if (!isDuplicatePost(p, out)) out.push(p);
			}
			out.sort((a, b) => a.ts - b.ts);
			return out;
		}

		function postKey(p) {
			return `${p.ts}\u0000${p.from}\u0000${p.text}`;
		}

		function historySignature(history) {
			const keys = normalizeHistoryList(history).map(postKey);
			let h = 2166136261;
			for (const line of keys) {
				for (let i = 0; i < line.length; i++) {
					h ^= line.charCodeAt(i);
					h = Math.imul(h, 16777619);
				}
			}
			return (h >>> 0).toString(16).padStart(8, "0");
		}

		function diffHistory(base, incoming) {
			const a = normalizeHistoryList(base);
			const b = normalizeHistoryList(incoming);
			const aSet = new Set(a.map(postKey));
			const bSet = new Set(b.map(postKey));
			const removed = a.filter((p) => !bSet.has(postKey(p)));
			const added = b.filter((p) => !aSet.has(postKey(p)));
			return { removed, added };
		}

		function shortenText(text, max = 90) {
			const s = String(text || "").replace(/\s+/g, " ").trim();
			if (s.length <= max) return s;
			return `${s.slice(0, max - 1)}...`;
		}

		function formatDiffLine(prefix, post) {
			const who = peerSuffix(post.from) || post.from;
			const when = new Date(post.ts).toLocaleTimeString();
			return `${prefix} [${when}] ${who}: ${shortenText(post.text)}`;
		}

		function emitHistoryDiffNotes(removed, added) {
			const rm = removed.slice(0, MAX_DIFF_NOTES_PER_SIDE);
			const ad = added.slice(0, MAX_DIFF_NOTES_PER_SIDE);
			for (const p of rm) systemNote(formatDiffLine("-", p));
			for (const p of ad) systemNote(formatDiffLine("+", p));
			if (removed.length > rm.length) systemNote(`- ... ${removed.length - rm.length} more`);
			if (added.length > ad.length) systemNote(`+ ... ${added.length - ad.length} more`);
		}

		function upsertLogReport(peerId, report) {
			const id = String(peerId || "").trim();
			if (!id) return;
			const history = normalizeHistoryList(report?.history);
			const savedAt = Number(report?.savedAt);
			state.logReports.set(id, {
				peerId: id,
				savedAt: Number.isFinite(savedAt) ? savedAt : 0,
				history,
				sig: historySignature(history),
			});
		}

		function currentTopicClientPeerIds() {
			const ids = [state.peerId];
			for (const [peerId, c] of state.conns.entries()) {
				if (c?.metadata?.role === "client" && c?.metadata?.topic === state.topic) ids.push(peerId);
			}
			return Array.from(new Set(ids.filter(Boolean)));
		}

		function applyAuthoritativeHistory(sourcePeerId, savedAt, incomingHistory, reasonText) {
			const incoming = normalizeHistoryList(incomingHistory);
			const before = normalizeHistoryList(state.history);
			const { removed, added } = diffHistory(before, incoming);
			if (removed.length || added.length) {
				const who = peerSuffix(sourcePeerId) || sourcePeerId || "unknown";
				systemNote(`${reasonText} from ${who} (savedAt=${savedAt || 0})`);
				emitHistoryDiffNotes(removed, added);
			}
			state.history = incoming;
			renderHistory();
			saveThreadLogToStorage();
		}

		function saveThreadLogToStorage() {
			if (!state.threadLogKey) return;
			const deduped = normalizeHistoryList(state.history);
			const payload = { v: 1, savedAt: Date.now(), history: deduped.slice(-500) };
			try {
				localStorage.setItem(state.threadLogKey, JSON.stringify(payload));
				state.localLogSavedAt = payload.savedAt;
			} catch (e) {
				console.warn("thread log save failed", e);
			}
		}

		function restoreThreadLogFromStorage() {
			if (!state.threadLogKey) return 0;
			try {
				const raw = localStorage.getItem(state.threadLogKey);
				if (!raw) return 0;
				const parsed = JSON.parse(raw);
				const incoming = Array.isArray(parsed?.history) ? parsed.history : [];
				const restored = normalizeHistoryList(incoming);
				const savedAt = Number(parsed?.savedAt);
				state.localLogSavedAt = Number.isFinite(savedAt) ? savedAt : 0;
				state.history = restored;
				renderHistory();
				return restored.length;
			} catch (e) {
				console.warn("thread log restore failed", e);
				return 0;
			}
		}

		function fullPeerIdFromSuffix(suffix) {
			return `chan-${state.topic}-${suffix}`;
		}

		function makeClientPeerId() {
			return fullPeerIdFromSuffix(ensureClientSuffix());
		}

		function peerSuffix(peerId) {
			if (!peerId) return "";
			const tail = String(peerId).split("-").pop() || "";
			return HEX4_RE.test(tail) ? tail.toLowerCase() : peerId;
		}

		function normalizeTargetPeerId(input) {
			const raw = String(input || "").trim().toLowerCase();
			if (!raw) return "";
			if (HEX4_RE.test(raw)) return fullPeerIdFromSuffix(raw);
			return raw;
		}

		function topicFromUrl() {
			const rawSearch = String(location.search || "").replace(/^\?/, "").trim();
			if (!rawSearch) return "b";
			if (rawSearch.includes("=")) {
				const params = new URLSearchParams(location.search || "");
				const named = params.get("board") || params.get("topic") || "";
				return slugify(named || "b");
			}
			const firstToken = rawSearch.split("&")[0];
			return slugify(decodeURIComponent(firstToken || "b"));
		}

		function peerSuffixFromUrl() {
			const params = new URLSearchParams(location.search || "");
			const raw = String(params.get("id") || params.get("peer") || params.get("pid") || "").trim().toLowerCase();
			if (HEX4_RE.test(raw) && raw !== "0000") return raw;
			return "";
		}

		function setStatusPill(el, label, value) {
			el.innerHTML = `${label}: <strong>${value}</strong>`;
		}

		function updateStatus() {
			const peerShort = peerSuffix(state.peerId) || "…";
			const hostShort = peerSuffix(state.hostId) || "…";

			setStatusPill(els.role, "role", state.isHost ? "host" : "client");
			setStatusPill(els.statusTopic, "topic", state.topic);
			setStatusPill(els.statusPeer, "id", peerShort);
			setStatusPill(els.statusHost, "host", hostShort);

			els.myId.value = peerShort;

			const avatar = document.getElementById("composer-avatar");
			if (avatar) avatar.textContent = peerShort.slice(0, 4) || "me";
		}

		function createPostCard({ from, text, ts, dm = false, system = false }) {
			const card = document.createElement("article");
			card.className = "post" + (dm ? " dm" : "") + (system ? " system" : "");
			card.dataset.kind = system ? "system" : "user";

			const avatar = document.createElement("div");
			avatar.className = "post-avatar";
			avatar.textContent = system ? "i" : (peerSuffix(from) || String(from).slice(0, 2)).slice(0, 4);

			const main = document.createElement("div");
			main.className = "post-main";

			const meta = document.createElement("div");
			meta.className = "meta";

			const authorWrap = document.createElement("div");
			authorWrap.className = "post-author-wrap";

			const author = document.createElement("span");
			author.className = "author";
			author.textContent = system
				? "system"
				: dm
					? `private • ${peerSuffix(from) || "dm"}`
					: `anon ${peerSuffix(from) || "user"}`;

			authorWrap.appendChild(author);

			if (!system) {
				const tag = document.createElement("span");
				tag.className = "author-tag";
				tag.textContent = from;
				authorWrap.appendChild(tag);
			}

			const time = document.createElement("span");
			time.className = "time";
			time.textContent = new Date(ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }).toLowerCase();

			meta.append(authorWrap, time);

			const body = document.createElement("div");
			body.className = "body";
			body.textContent = text;

			main.append(meta, body);

			if (!system) {
				const actions = document.createElement("div");
				actions.className = "post-actions";
				actions.innerHTML = `
					<span title="Like">♡</span>
					<span title="Reply">💬</span>
					<span title="Repost">↻</span>
					<span title="Share">✈</span>
				`;
				main.appendChild(actions);
			}

			card.append(avatar, main);
			return card;
		}

		function postVisibleInActiveTab(post) {
			if (state.feedTab === "system") return !!post.system;
			return !post.system;
		}

		function renderFeed() {
			els.feed.innerHTML = "";
			for (const post of state.feedEntries) {
				if (!postVisibleInActiveTab(post)) continue;
				els.feed.append(createPostCard(post));
			}
			els.feed.scrollTop = els.feed.scrollHeight;
		}

		function switchFeedTab(tab) {
			state.feedTab = tab === "system" ? "system" : "user";
			const userActive = state.feedTab === "user";
			els.tabUser.classList.toggle("active", userActive);
			els.tabSystem.classList.toggle("active", !userActive);
			els.tabUser.setAttribute("aria-selected", String(userActive));
			els.tabSystem.setAttribute("aria-selected", String(!userActive));
			renderFeed();
		}

		function upsertFeedEntry(post) {
			if (!isDuplicatePost(post, state.feedEntries)) state.feedEntries.push(post);
			renderFeed();
		}

		function renderHistory() {
			const keep = state.feedEntries.filter((p) => p.system || p.dm);
			state.feedEntries = [...keep, ...state.history.map((p) => ({ ...p, dm: false, system: false }))].sort((a, b) => a.ts - b.ts);
			renderFeed();
		}

		function isDuplicatePost(p, list) {
			return list.some((q) => q.ts === p.ts && q.from === p.from && q.text === p.text);
		}

		function recordPost(p) {
			if (!isDuplicatePost(p, state.history)) state.history.push(p);
			saveThreadLogToStorage();
			upsertFeedEntry(p);
		}

		function systemNote(text) { upsertFeedEntry({ from: "system", text, ts: Date.now(), system: true }); }

		async function deriveKey(topic, secret) {
			const passphrase = `${topic}:${secret || ""}`;
			const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(passphrase));
			return crypto.subtle.importKey("raw", hash, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
		}

		function toBase64(buf) {
			const bytes = new Uint8Array(buf);
			let str = "";
			for (let i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
			return btoa(str);
		}

		function fromBase64(str) {
			const bin = atob(str);
			const out = new Uint8Array(bin.length);
			for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
			return out;
		}

		async function encryptPayload(payload) {
			if (!state.key) throw new Error("missing key");
			const iv = crypto.getRandomValues(new Uint8Array(12));
			const data = new TextEncoder().encode(JSON.stringify(payload));
			const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, state.key, data);
			return `${toBase64(iv)}:${toBase64(cipher)}`;
		}

		async function decryptPayload(wire) {
			if (!state.key) throw new Error("missing key");
			const [ivStr, dataStr] = String(wire || "").split(":");
			if (!ivStr || !dataStr) throw new Error("bad packet");
			const iv = fromBase64(ivStr);
			const data = fromBase64(dataStr);
			const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, state.key, data);
			return JSON.parse(new TextDecoder().decode(new Uint8Array(plain)));
		}

		function connectAsClient() {
			state.peer?.destroy();
			const peerId = makeClientPeerId();
			state.peerId = peerId;
			state.peer = new Peer(peerId, config);
			bindCommonPeerEvents(state.peer);
			state.peer.on("connection", setupConn);
			state.peer.on("open", () => {
				persistUserId(state.peerId);
				updateStatus();
				startHostDiscovery();
			});
		}

		function startHostDiscovery() {
			if (state.hostProbeInterval) clearInterval(state.hostProbeInterval);
			attemptHostConnection();
			state.hostProbeInterval = setInterval(() => {
				if (state.isHost) return;
				if (state.hostConn && state.hostConn.open) return;
				attemptHostConnection();
			}, 6000);
		}

		function becomeHost() {
			state.isHost = true;
			state.hostProbeFailures = 0;
			state.discoveringHost = false;
			state.logConsensusToken = "";
			state.logReports.clear();
			if (state.hostProbeInterval) clearInterval(state.hostProbeInterval);
			state.hostProbeInterval = null;
			if (state.hostConn && state.hostConn.open) state.hostConn.close();
			state.hostConn = null;
			state.peer?.destroy();
			state.peerId = state.hostId;
			state.peer = new Peer(state.hostId, config);
			bindCommonPeerEvents(state.peer);
			state.peer.on("open", () => {
				persistUserId(state.peerId);
				updateStatus();
				systemNote(`you are host for /${state.topic}/`);
				upsertLogReport(state.peerId, { savedAt: state.localLogSavedAt, history: state.history });
				if (state.syncInterval) clearInterval(state.syncInterval);
				state.syncInterval = setInterval(broadcastHistory, 5000);
			});
			state.peer.on("connection", setupConn);
		}

		function bindCommonPeerEvents(boundPeer) {
			boundPeer.on("error", (err) => {
				if (boundPeer !== state.peer) return;
				console.error(err);
				if (err.type === "unavailable-id") {
					if (state.isHost) {
						state.isHost = false;
						state.hostProbeFailures = 0;
						systemNote("host id busy; rejoining and probing for active host");
						connectAsClient();
						return;
					}
					if (HEX4_RE.test(state.urlPeerSuffix) && state.urlPeerSuffix !== "0000") {
						systemNote("url peer id is unavailable; change ?id=xxxx and rejoin");
						return;
					}
					rotateClientSuffix();
					systemNote("peer id collision; retrying with a new 4-hex id");
					connectAsClient();
					return;
				}
				systemNote(`peer error: ${err.type}`);
			});
			boundPeer.on("close", () => {
				if (boundPeer !== state.peer) return;
				systemNote("peer closed; retry join");
			});
			boundPeer.on("disconnected", () => {
				if (boundPeer !== state.peer) return;
				systemNote("peer disconnected; attempting reconnect");
				if (!boundPeer.destroyed) boundPeer.reconnect();
			});
		}

		function attemptHostConnection() {
			if (state.isHost) return;
			if (state.discoveringHost) return;
			if (state.hostConn && state.hostConn.open) return;
			state.discoveringHost = true;
			const conn = state.peer.connect(state.hostId, { metadata: { role: "client", topic: state.topic } });
			let settled = false;

			const finish = () => {
				settled = true;
				state.discoveringHost = false;
				clearTimeout(timer);
			};

			const timer = setTimeout(() => {
				if (settled) return;
				finish();
				systemNote("no host detected; claiming host role");
				becomeHost();
			}, 4000);

			conn.on("open", () => {
				if (settled) return;
				finish();
				state.hostProbeFailures = 0;
				state.isHost = false;
				state.hostConn = conn;
				setupConn(conn);
				conn.on("close", () => {
					state.hostConn = null;
					if (!state.isHost) {
						systemNote("host disconnected; promoting local thread cache to new host");
						becomeHost();
					}
				});
				sendLogSnapshot(conn).catch((e) => {
					console.warn("initial log snapshot send failed", e);
				});
				systemNote(`connected to host ${state.hostId}`);
			});

			conn.on("error", (err) => {
				if (settled) return;
				finish();
				if (String(err?.type || "") === "peer-unavailable") {
					systemNote("failed to reach host; claiming host role");
					becomeHost();
					return;
				}
				state.hostProbeFailures += 1;
				if (state.hostProbeFailures >= HOST_PROBE_FAILURES_BEFORE_CLAIM) {
					systemNote(`host probe failed ${state.hostProbeFailures} times; claiming host role`);
					becomeHost();
					return;
				}
				systemNote(`host probe failed (${err?.type || "unknown"}); retrying (${state.hostProbeFailures}/${HOST_PROBE_FAILURES_BEFORE_CLAIM})`);
			});
		}

		function setupConn(conn) {
			state.conns.set(conn.peer, conn);
			conn.on("data", (d) => handlePacket(conn, d));
			conn.on("close", () => {
				state.conns.delete(conn.peer);
				if (state.isHost) {
					state.logReports.delete(conn.peer);
					evaluateLatestLogConsensus();
				}
			});
			if (state.isHost && conn.metadata?.role === "client" && conn.metadata.topic === state.topic) {
				if (conn.open) {
					sendHistory(conn);
					requestLogSnapshot(conn);
				} else {
					conn.on("open", () => {
						sendHistory(conn);
						requestLogSnapshot(conn);
					});
				}
			}
		}

		function requestLogSnapshot(conn) {
			if (!conn?.open) return;
			conn.send({ kind: "log-sync-request", topic: state.topic });
		}

		async function sendLogSnapshot(conn) {
			if (!conn?.open || !state.key) return;
			const payload = {
				from: state.peerId,
				savedAt: state.localLogSavedAt || 0,
				history: normalizeHistoryList(state.history),
			};
			const packet = { kind: "log-state", topic: state.topic, cipher: await encryptPayload(payload) };
			conn.send(packet);
		}

		async function broadcastAuthoritativeHistory(sourcePeerId, savedAt, history) {
			if (!state.isHost) return;
			const packet = {
				kind: "history-authoritative",
				topic: state.topic,
				cipher: await encryptPayload({ sourcePeerId, savedAt, history: normalizeHistoryList(history) }),
			};
			for (const [peerId, c] of state.conns.entries()) {
				if (peerId === state.peerId) continue;
				if (c.open && c.metadata?.topic === state.topic) c.send(packet);
			}
		}

		function newestReport(a, b) {
			if (!a) return b;
			if (!b) return a;
			if ((b.savedAt || 0) > (a.savedAt || 0)) return b;
			if ((b.savedAt || 0) < (a.savedAt || 0)) return a;
			if ((b.history?.length || 0) > (a.history?.length || 0)) return b;
			if ((b.history?.length || 0) < (a.history?.length || 0)) return a;
			return String(b.peerId) < String(a.peerId) ? b : a;
		}

		function evaluateLatestLogConsensus() {
			if (!state.isHost) return;
			upsertLogReport(state.peerId, { savedAt: state.localLogSavedAt, history: state.history });
			const participants = currentTopicClientPeerIds();
			const reports = participants.map((id) => state.logReports.get(id)).filter(Boolean);
			if (!reports.length) return;
			let winner = null;
			for (const r of reports) winner = newestReport(winner, r);
			if (!winner) return;
			const mismatchCount = new Set(reports.map((r) => r.sig)).size;
			const sortedIds = [...participants].sort().join(",");
			const token = `${sortedIds}|${winner.peerId}|${winner.savedAt}|${winner.sig}|${mismatchCount}`;
			if (token === state.logConsensusToken) return;
			state.logConsensusToken = token;
			if (mismatchCount > 1) {
				systemNote(`localStorage mismatch across ${reports.length} users; selecting latest savedAt`);
			}
			applyAuthoritativeHistory(winner.peerId, winner.savedAt, winner.history, "merged latest localStorage");
			broadcastAuthoritativeHistory(winner.peerId, winner.savedAt, winner.history).catch((e) => {
				console.warn("broadcast authoritative history failed", e);
			});
		}

		async function handlePacket(conn, packet) {
			try {
				if (!packet || typeof packet !== "object") return;
				if (packet.kind === "topic" && packet.topic === state.topic) {
					await ingestTopicPacket(conn.peer, packet);
				}
				if (packet.kind === "dm") {
					const payload = await decryptPayload(packet.cipher);
					upsertFeedEntry({ from: payload.from, text: payload.text, ts: payload.ts, dm: true });
				}
				if (packet.kind === "history" && packet.topic === state.topic) {
					try {
						const payload = await decryptPayload(packet.cipher);
						const incoming = Array.isArray(payload.history) ? payload.history : [];
						const merged = [...incoming];
						for (const p of state.history) {
							if (!merged.some((q) => q.ts === p.ts && q.from === p.from && q.text === p.text)) {
								merged.push(p);
							}
						}
						merged.sort((a, b) => a.ts - b.ts);
						state.history = merged;
						saveThreadLogToStorage();
						renderHistory();
					} catch (histErr) {
						console.warn("history sync skipped (key mismatch)", histErr);
					}
				}
				if (packet.kind === "log-sync-request" && packet.topic === state.topic) {
					await sendLogSnapshot(conn);
				}
				if (packet.kind === "log-state" && packet.topic === state.topic && state.isHost) {
					const payload = await decryptPayload(packet.cipher);
					const reportPeerId = String(payload.from || conn.peer || "").trim() || conn.peer;
					upsertLogReport(reportPeerId, payload);
					evaluateLatestLogConsensus();
				}
				if (packet.kind === "history-authoritative" && packet.topic === state.topic && !state.isHost) {
					try {
						const payload = await decryptPayload(packet.cipher);
						applyAuthoritativeHistory(
							payload.sourcePeerId,
							Number(payload.savedAt) || 0,
							payload.history,
							"merged latest localStorage"
						);
					} catch (authErr) {
						console.warn("authoritative history apply skipped", authErr);
					}
				}
			} catch (err) {
				console.error(err);
				systemNote(`decrypt failed: ${err.message}`);
			}
		}

		async function ingestTopicPacket(sourceId, packet) {
			const payload = await decryptPayload(packet.cipher);
			recordPost({ from: payload.from, text: payload.text, ts: payload.ts, dm: false });
			if (!state.isHost) return;
			for (const [peerId, c] of state.conns.entries()) {
				if (peerId === sourceId || peerId === state.peerId) continue;
				if (c.open) c.send(packet);
			}
		}

		async function sendToTopic(text) {
			if (!state.key) return systemNote("join a topic first");
			const payload = { from: state.peerId, text, ts: Date.now(), topic: state.topic };
			const packet = { kind: "topic", topic: state.topic, cipher: await encryptPayload(payload) };
			if (state.isHost) {
				await ingestTopicPacket(state.peerId, packet);
			} else if (state.hostConn && state.hostConn.open) {
				state.hostConn.send(packet);
				recordPost({ from: payload.from, text: payload.text, ts: payload.ts, dm: false });
			} else {
				systemNote("no host connection");
			}
		}

		async function sendHistory(conn) {
			if (!state.history.length || !conn?.open) return;
			const packet = { kind: "history", topic: state.topic, cipher: await encryptPayload({ history: state.history }) };
			conn.send(packet);
		}

		async function broadcastHistory() {
			try {
				if (!state.isHost || !state.history.length) return;
				const packet = { kind: "history", topic: state.topic, cipher: await encryptPayload({ history: state.history }) };
				for (const [peerId, c] of state.conns.entries()) {
					if (peerId === state.peerId) continue;
					if (c.open && c.metadata?.topic === state.topic) c.send(packet);
				}
			} catch (e) {
				console.warn("broadcastHistory error:", e);
			}
		}

		async function sendDirect(targetId, text) {
			if (!state.key || !state.peer || state.peer.destroyed) {
				systemNote("join a topic first");
				return false;
			}
			if (!targetId) {
				systemNote("enter a peer id for DM");
				return false;
			}
			if (targetId === state.peerId) {
				systemNote("cannot DM yourself");
				return false;
			}
			const body = String(text || "").trim();
			if (!body) {
				systemNote("enter a DM message");
				return false;
			}

			const payload = { from: state.peerId, text: body, ts: Date.now() };
			const packet = { kind: "dm", cipher: await encryptPayload(payload) };
			let conn = state.conns.get(targetId);
			if (!conn) {
				conn = state.peer.connect(targetId, { metadata: { role: "dm", topic: state.topic } });
				setupConn(conn);
			}

			const sendPacket = () => {
				if (!conn.open) return;
				conn.send(packet);
				upsertFeedEntry({ from: `${state.peerId} -> ${targetId}`, text: body, ts: payload.ts, dm: true });
			};

			if (conn.open) {
				sendPacket();
				return true;
			}

			if (typeof conn.once === "function") {
				conn.once("open", sendPacket);
				conn.once("error", (err) => systemNote(`dm failed: ${err?.type || "unknown"}`));
			} else {
				conn.on("open", sendPacket);
				conn.on("error", (err) => systemNote(`dm failed: ${err?.type || "unknown"}`));
			}
			return true;
		}

		async function sendDirectFromComposer() {
			const target = normalizeTargetPeerId(els.dmTarget.value || "");
			const text = (els.dmMessage.value || "").trim();
			const sent = await sendDirect(target, text);
			if (sent) els.dmMessage.value = "";
		}

		async function joinTopic() {
			if (state.syncInterval) clearInterval(state.syncInterval);
			state.syncInterval = null;
			if (state.hostProbeInterval) clearInterval(state.hostProbeInterval);
			state.hostProbeInterval = null;
			state.hostProbeFailures = 0;
			state.discoveringHost = false;
			state.logConsensusToken = "";
			state.logReports.clear();
			state.topic = topicFromUrl();
			state.urlPeerSuffix = peerSuffixFromUrl();
			if (state.urlPeerSuffix) {
				state.clientSuffix = state.urlPeerSuffix;
				writeStoredClientSuffix(state.clientSuffix);
			}
			state.secret = els.secret.value || "";
			state.hostId = fullPeerIdFromSuffix("0000");
			state.conns.forEach((c) => c.close());
			state.conns.clear();
			state.hostConn = null;
			state.isHost = false;
			state.history = [];
			state.feedEntries = [];
			state.localLogSavedAt = 0;
			state.threadLogKey = await threadLogKeyFor(state.topic, state.secret);
			state.key = await deriveKey(state.topic, state.secret);
			const restoredCount = restoreThreadLogFromStorage();
			if (restoredCount) systemNote(`restored ${restoredCount} local posts`);
			systemNote(`joining /${state.topic}/ ...`);
			connectAsClient();
			updateStatus();
		}

		function clearFeed() {
			state.feedEntries = [];
			renderFeed();
		}

		els.join.onclick = joinTopic;
		els.send.onclick = async () => {
			const text = (els.message.value || "").trim();
			if (!text) return;
			els.message.value = "";
			await sendToTopic(text);
		};
		els.clear.onclick = clearFeed;
		els.tabUser.onclick = () => switchFeedTab("user");
		els.tabSystem.onclick = () => switchFeedTab("system");

		els.message.addEventListener("keydown", (e) => {
			if (e.key === "Enter" && !e.shiftKey) {
				e.preventDefault();
				els.send.click();
			}
		});

		els.dmMessage.addEventListener("keydown", (e) => {
			if (e.key === "Enter") {
				e.preventDefault();
				sendDirectFromComposer();
			}
		});

		(function bootstrap() {
			const hash = (location.hash || "").replace(/^#/, "");
			if (hash) els.secret.value = hash;
			restoreUserIdFromStorage();
			joinTopic();
		})();
	</script>
</body>
</html>
